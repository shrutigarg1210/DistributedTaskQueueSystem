# spring.application.name=demo

# H2 Database (temporary - will replace with PostgreSQL later)
spring.datasource.url=jdbc:h2:mem:taskqueue;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (view your database in browser)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Flyway - disable for now, H2 will auto create tables
spring.flyway.enabled=false

# Server
server.port=8080
spring.application.name=taskqueue
